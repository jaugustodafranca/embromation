# project.yml
name: Embromation
options:
  bundleIdPrefix: app.embromation
  deploymentTarget:
    macOS: "14.0"
packages:
  TranslatorCore:
    path: TranslatorCore
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 2.4.0
  # NOTE: as of mid-2026, MLXLLM/MLXLMCommon moved out of mlx-swift-examples
  # into their own package. See task-10-report.md for the full API-drift writeup.
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    revision: feff32d610efd6b4b074121758b7c345344e6473
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    exactVersion: 0.9.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    exactVersion: 1.3.3
targets:
  Embromation:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - App/Resources
    settings:
      base:
        ARCHS: arm64
        PRODUCT_BUNDLE_IDENTIFIER: app.embromation.Embromation
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Embromation.entitlements
        # Sign local builds with the (stable) Developer ID identity so the
        # binary's identity survives rebuilds — otherwise every ad-hoc rebuild
        # invalidates the Accessibility (TCC) grant and onboarding blocks
        # forever. There is no "Apple Development" cert in this keychain, only
        # Developer ID. CI is unaffected: it builds with CODE_SIGNING_ALLOWED=NO.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: 688YYDN5Z4
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.10
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: TranslatorCore
      - package: KeyboardShortcuts
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
