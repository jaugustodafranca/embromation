# project.yml
name: Embromation
options:
  bundleIdPrefix: app.embromation
  deploymentTarget:
    macOS: "14.0"
packages:
  TranslatorCore:
    path: TranslatorCore
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  # NOTE: as of mid-2026, MLXLLM/MLXLMCommon moved out of mlx-swift-examples
  # into their own package. See task-10-report.md for the full API-drift writeup.
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    revision: feff32d610efd6b4b074121758b7c345344e6473
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
targets:
  Embromation:
    type: application
    platform: macOS
    sources:
      - App/Sources
    settings:
      base:
        ARCHS: arm64
        PRODUCT_BUNDLE_IDENTIFIER: app.embromation.Embromation
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Embromation.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: 5.10
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: TranslatorCore
      - package: KeyboardShortcuts
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
